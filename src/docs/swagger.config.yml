openapi: 3.0.0
info:
  title: TCG API - Celien
  version: 1.0.0
  description: Documentation de l'API TCG

servers:
  - url: http://localhost:3001

tags:
  - name: Auth
    description: Endpoints d'authentification (inscription, connexion)
  - name: Cards
    description: Gestion et consultation des cartes
  - name: Decks
    description: Création et gestion des decks privés

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string }
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Card:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        hp: { type: integer }
        attack: { type: integer }
        type: { type: string }
        pokedexNumber: { type: integer }

    Deck:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        userId: { type: integer }
        cards:
          type: array
          items:
            $ref: "#/components/schemas/Card"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time


